  <text x="112" y="278" fill="#2C2520" font-family="Cormorant Garamond, Georgia, serif" font-size="112" font-weight="500">2014</text>
  <text x="112" y="386" fill="#2C2520" font-family="Cormorant Garamond, Georgia, serif" font-size="74" font-weight="500">The salon grows</text>
  <text x="112" y="454" fill="#6B5D52" font-family="Inter, Arial, sans-serif" font-size="28">A new owner carried forward the name,</text>
  <text x="112" y="498" fill="#6B5D52" font-family="Inter, Arial, sans-serif" font-size="28">the regulars, and the neighborhood feel.</text>
  <text x="112" y="572" fill="#6B5D52" font-family="Inter, Arial, sans-serif" font-size="24">This chapter is about continuity: better color,</text>
  <text x="112" y="610" fill="#6B5D52" font-family="Inter, Arial, sans-serif" font-size="24">fresh techniques, and the same familiar trust.</text>
